services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: harmonizing-web
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://harmonizing:harmonizing@postgres:5432/harmonizing
      NEXTAUTH_URL: http://localhost:3001
      S3_ENDPOINT: http://minio:9000
    depends_on:
      - postgres
      - minio
      - mailhog
    command: ["sh", "/app/entrypoint.sh"]
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules

  postgres:
    image: postgres:16-alpine
    container_name: harmonizing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: harmonizing
      POSTGRES_USER: harmonizing
      POSTGRES_PASSWORD: harmonizing
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  minio:
    image: minio/minio:latest
    container_name: harmonizing-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: harmonizing-minio-init
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "/setup.sh"]
    volumes:
      - ./infra/minio/setup.sh:/setup.sh:ro
    restart: "no"

  mailhog:
    image: mailhog/mailhog:latest
    container_name: harmonizing-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  minio_data:
  web_node_modules:
